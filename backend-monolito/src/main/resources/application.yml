spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # útil se já existirem tabelas
    validate-on-migrate: true
    clean-disabled: true          # evita "clean" acidental em prod

  datasource:
    url: ${JDBC_DATABASE_URL:${DATABASE_URL}}
    username: ${JDBC_DATABASE_USERNAME:${DB_USERNAME}}
    password: ${JDBC_DATABASE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 30000
      max-lifetime: 1800000        # 30m < 55m típicos de proxies
      connection-timeout: 20000
      validation-timeout: 5000
      leak-detection-threshold: ${DB_LEAK_MS:0} # 0 = off

  jpa:
    hibernate:
      ddl-auto: validate           # ✅ Flyway migra; Hibernate só valida
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
        jdbc.lob.non_contextual_creation: true
      # Se usar a biblioteca hibernate-types do Vlad (JSONB com Jackson):
      hibernate.types.json_format_mapper: jackson

  mvc:
    async:
      request-timeout: -1

  lifecycle:
    timeout-per-shutdown-phase: 15s

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

  task:
    scheduling.pool.size: 2

server:
  port: ${PORT:${SERVER_PORT:8080}}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json, text/html, text/plain
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints.web.exposure.include: health,info,env,loggers,metrics
  endpoint.health.probes.enabled: true

logging:
  level:
    org.hibernate: warn
    org.hibernate.orm.connections.pooling: warn
    com.zaxxer.hikari: warn
    com.luizgasparetto.backend.monolito: info
    org.springframework.boot.context.config: info
    # ajuste seus serviços conforme necessidade:
    com.luizgasparetto.backend.monolito.services.PixWatcher: debug
    com.luizgasparetto.backend.monolito.services.CardWatcher: debug
    com.luizgasparetto.backend.monolito.services.PaymentProcessor: debug

email:
  author: ${EMAIL_AUTHOR}

efi:
  pix:
    client-id: ${EFI_CLIENT_ID}
    client-secret: ${EFI_CLIENT_SECRET}
    chave: ${EFI_PIX_KEY}
    cert-path: ${EFI_PIX_CERT_PATH:classpath:producao-ec-agenor.p12}
    cert-password: ${EFI_PIX_CERT_PASSWORD:}   # não deixe hardcoded
    sandbox: ${EFI_PIX_SANDBOX:false}
  card:
    client-id: ${EFI_CARD_CLIENT_ID}
    client-secret: ${EFI_CARD_CLIENT_SECRET}
    sandbox: ${EFI_CARD_SANDBOX:false}
  payout:
    favored-key: ${EFI_PAYOUT_FAVORED_KEY:}     # opcional; se vazio, pega do autor
    # ---- tarifas Efí (estimadas/contratuais) ----
    fee-percent: ${EFI_PAYOUT_FEE_PERCENT:0}    # ex.: 1.59
    fee-fixed:   ${EFI_PAYOUT_FEE_FIXED:0}      # ex.: 0.49
    # ---- sua margem/segurança (desconto do repasse) ----
    margin-percent: ${EFI_PAYOUT_MARGIN_PERCENT:0.8}
    margin-fixed:   ${EFI_PAYOUT_MARGIN_FIXED:0}
    # mínimos
    min-send: ${EFI_PAYOUT_MIN_SEND:1.00}
    # janelas/tempos
    delay:
      cardDays: ${EFI_PAYOUT_DELAY_CARD_DAYS:30}     # D+30 p/ cartão
      pixMinutes: ${EFI_PAYOUT_DELAY_PIX_MINUTES:0}  # imediato p/ PIX
    # políticas
    fees:
      includeGatewayFees: ${EFI_PAYOUT_INCLUDE_FEES:true}
    behavior:
      onePayoutPerAuthorPerOrder: ${EFI_PAYOUT_ONE_PER_AUTHOR:true}

springdoc:
  api-docs.path: /api-docs
  swagger-ui:
    path: /swagger
    display-request-duration: true
    try-it-out-enabled: true

checkout:
  reserve:
    ttl-seconds: ${CHECKOUT_RESERVE_TTL_SECONDS:300}
    reaper-ms: ${CHECKOUT_RESERVE_REAPER_MS:60000}
